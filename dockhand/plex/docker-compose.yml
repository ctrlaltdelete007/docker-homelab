# simplified example compose
# production setup contains additional services and environment variables

services:
  plex:
    image: ghcr.io/linuxserver/plex
    restart: unless-stopped
    ports:
      - "32400:32400"
    volumes:
      - /mnt/docker/data/plex/config:/config
      - /mnt/ds/video:/movies
      - /mnt/ds/series:/series
